services:
  caddy:
    image: caddy:latest
    container_name: caddy_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "5678:5678"
    command: >
      sh -c "echo '${WEBSITE_DOMAIN} {
        handle /api/* {
          reverse_proxy php_server:80
        }
        handle {
          reverse_proxy react_frontend:80
        }
      }
      ${WEBSITE_DOMAIN}:5678 {
        reverse_proxy n8n:5678
      }' > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - react_frontend
      - php_server
      - n8n

  mysql:
    image: mysql:8.0
    container_name: n8n_mysql
    restart: always
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${BACKEND_DB_NAME}
      - MYSQL_USER=${BACKEND_DB_USER}
      - MYSQL_PASSWORD=${BACKEND_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_prod
    restart: always
    expose:
      - "5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=${WEBSITE_DOMAIN}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - GENERIC_TIMEZONE=Europe/Brussels
      - DB_TYPE=mysqldb
      - DB_MYSQLDB_DATABASE=${N8N_DB_NAME}
      - DB_MYSQLDB_HOST=${DB_HOST}
      - DB_MYSQLDB_PORT=${DB_PORT}
      - DB_MYSQLDB_USER=${N8N_DB_USER}
      - DB_MYSQLDB_PASSWORD=${N8N_DB_PASSWORD}
    depends_on:
      - mysql

  php_server:
    environment:
      - APP_ENV=prod
      - DATABASE_URL=mysql://${BACKEND_DB_USER}:${BACKEND_DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${BACKEND_DB_NAME}?serverVersion=8.0
      - CORS_ALLOW_ORIGIN=^https?://(localhost|127\.0\.0\.1|${WEBSITE_DOMAIN})(:[0-9]+)?$
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: symfony_php_prod
    restart: always
    expose:
      - "80"
    command: sh -c "a2enmod rewrite && apache2-foreground"

  react_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: react_nginx_prod
    restart: always
    expose:
      - "80"

volumes:
  n8n_data:
  mysql_data:
  caddy_data:
  caddy_config: