version: "3.8"

volumes:
  n8n_data:
  mysql_data:

services:
  # 1. Base de données
  mysql:
    image: mysql:8.0
    container_name: n8n_mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root_password_secret
      - MYSQL_DATABASE=n8n_db
      - MYSQL_USER=n8n_user
      - MYSQL_PASSWORD=n8n_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  # 2. Orchestrateur IA
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_local
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Brussels
      - DB_TYPE=mysqldb
      - DB_MYSQLDB_DATABASE=n8n_db
      - DB_MYSQLDB_HOST=mysql
      - DB_MYSQLDB_PORT=3306
      - DB_MYSQLDB_USER=n8n_user
      - DB_MYSQLDB_PASSWORD=n8n_password
    depends_on:
      - mysql

  # 3. NOUVEAU : Serveur Web (PHP 8.3 + Apache pour Symfony)
  php_server:
    image: php:8.3-apache
    container_name: symfony_php
    restart: always
    ports:
      - "8000:80" # Ton backend sera accessible sur http://localhost:8000
    volumes:
      - ./backend:/var/www/html # Lie ton dossier local au serveur
    # Active le mod_rewrite indispensable pour Symfony
    command: sh -c "a2enmod rewrite && apache2-foreground"

  # 4. NOUVEAU : Serveur Node.js (pour React)
  react_dev:
    image: node:20-alpine
    container_name: react_node
    working_dir: /app
    ports:
      - "5173:5173" # Port standard si tu utilises Vite (recommandé pour React)
      - "3000:3000" # Port standard si tu utilises Create React App
    volumes:
      - ./frontend:/app # Lie ton dossier local au conteneur Node
    # Astuce : maintient le conteneur en vie même si React n'est pas encore installé
    command: sh -c "npm run dev || tail -f /dev/null"